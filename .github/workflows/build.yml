#
# Builds the vanilla debug APK + runs ktlint for the Aurora Store fork.
# Mirrors the original GitLab CI pipeline (see .gitlab-ci.yml) but targets
# GitHub-hosted runners. The resulting APK is published as a workflow artifact.
name: Build Aurora Store

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Assemble vanilla debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses & inspect available API levels
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          # Log which platforms the runner already has + what the repo offers, so we can
          # diagnose "Failed to find package" without re-running the workflow.
          echo "--- Pre-installed platforms ---"
          ls -1 /usr/local/lib/android/sdk/platforms/ 2>/dev/null || true
          echo "--- Pre-installed build-tools ---"
          ls -1 /usr/local/lib/android/sdk/build-tools/ 2>/dev/null || true
          echo "--- Repository offers (android-3x) ---"
          sdkmanager --list 2>/dev/null | grep -E "android-3[0-9]" | head -20 || true

      - name: Install required SDK packages (all channels, AGP will fall back to auto-download)
        run: |
          # API 37 is very recent — try all channels (stable + beta + canary). If the package
          # still can't be found, don't fail the step: AGP 9.x auto-downloads missing SDK
          # components during the build as long as licenses are accepted (which we did above).
          sdkmanager --channel=0,1,2,3 "platforms;android-37" "build-tools;37.0.0" || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Assemble vanilla debug APK
        run: ./gradlew assembleVanillaDebug --no-daemon --no-configuration-cache --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: aurora-store-vanilla-debug
          path: app/build/outputs/apk/vanilla/debug/app-vanilla-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload room schemas
        uses: actions/upload-artifact@v4
        with:
          name: aurora-store-room-schemas
          path: app/schemas/com.aurora.store.data.room.AuroraDatabase/
          if-no-files-found: warn
          retention-days: 30

  lint:
    name: Ktlint checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Ktlint is advisory — a style nit shouldn't block APK publication.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install required SDK packages (all channels, non-blocking)
        run: |
          sdkmanager --channel=0,1,2,3 "platforms;android-37" "build-tools;37.0.0" || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-lint-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-lint-${{ runner.os }}-
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run ktlintCheck
        run: ./gradlew ktlintCheck --no-daemon --no-configuration-cache --stacktrace
